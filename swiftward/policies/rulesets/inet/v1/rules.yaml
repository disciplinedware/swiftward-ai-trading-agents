# Internet Gateway Policy — v1
#
# Evaluates internet.request events emitted by the inet_gateway service.
# Every HTTP/HTTPS request from jailed agent containers passes through here.
#
# Event fields:
#   event.data.domain    - destination hostname (e.g. "api.anthropic.com")
#   event.data.method    - HTTP method (GET, POST, CONNECT for HTTPS)
#   event.data.agent_id  - agent making the request (from reverse DNS or X-Agent-ID)
#
# Demo value:
#   1. Block malicious/exfiltration domains - visible REJECTED verdict in dashboard
#   2. Flag unknown domains - shows policy catching unexpected traffic
#   This proves Swiftward controls not just trades but the agent's entire internet access.

dsl_version: 2

constants:
  # Blocklist: regex pattern matching dangerous/exfiltration domains.
  # Each domain is anchored (^ $) so substrings don't false-positive.
  blocked_domains_regex: "^(mcp-proxy\\.anthropic\\.com|pastebin\\.com|transfer\\.sh|.*\\.ngrok\\.io|.*\\.ngrok-free\\.app|requestbin\\..*|webhook\\.site|.*\\.torrent\\..*|.*\\.onion)$"

  # Allowlist: regex pattern matching known-good domains.
  # Order: Anthropic, market data, news, Telegram, internal services.
  allowed_domains_regex: "^(.*\\.anthropic\\.com|.*\\.claude\\.ai|statsig\\.anthropic\\.com|sentry\\.io|.*\\.datadoghq\\.com|api\\.binance\\.com|api\\.bybit\\.com|api\\.binancefuture\\.com|.*\\.prismapi\\.ai|data-api\\.cryptocompare\\.com|min-api\\.cryptocompare\\.com|cryptopanic\\.com|api\\.telegram\\.org|swiftward-server|trading-server|postgres|localhost|127\\.0\\.0\\.1)$"

default_effects:
  verdict: approved

rules:
  # -- Block: known dangerous / exfiltration domains --------------------------
  block_dangerous_domains:
    enabled: true
    mode: sync
    all:
      - path: "event.data.domain"
        op: regex_match
        value: "{{ constants.blocked_domains_regex }}"
    effects:
      verdict: rejected
      priority: 100
      response:
        reason: "Domain blocked by internet policy: potential exfiltration or malicious activity"
        tag: "blocked_domain"
      actions:
        - action: http/request
          params:
            method: "POST"
            url: "https://api.telegram.org/bot{{ env.TELEGRAM_BOT_TOKEN }}/sendMessage"
            payload:
              chat_id: "{{ env.TELEGRAM_CHAT_ID }}"
              message_thread_id: "{{ env.TELEGRAM_SWIFTWARD_TOPIC_ID }}"
              text: "[INET/BLOCKED] {{ event.data.domain }}\nAgent {{ event.entity_id }} tried to reach a blocked domain.\nMethod: {{ event.data.method }}"

  # -- Flag: domains not in the known-good list -------------------------------
  # Allow the request but flag it for review. Demonstrates Swiftward catching
  # unexpected internet calls without breaking the agent.
  flag_unlisted_domains:
    enabled: true
    mode: sync
    all:
      - path: "event.data.domain"
        op: regex_not_match
        value: "{{ constants.allowed_domains_regex }}"
    effects:
      verdict: approved
      priority: 50
      response:
        reason: "Domain not in allowlist - approved but flagged for review"
        tag: "unlisted_domain"
      actions:
        - action: http/request
          params:
            method: "POST"
            url: "https://api.telegram.org/bot{{ env.TELEGRAM_BOT_TOKEN }}/sendMessage"
            payload:
              chat_id: "{{ env.TELEGRAM_CHAT_ID }}"
              message_thread_id: "{{ env.TELEGRAM_SWIFTWARD_TOPIC_ID }}"
              text: "[INET/REVIEW] {{ event.data.domain }}\nAgent {{ event.entity_id }} reached a domain not in the allowlist.\nMethod: {{ event.data.method }}"
