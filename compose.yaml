      - ${SANDBOX_DATA_PATH:-${PWD}/data/ruby-sandbox-data}/containers:/rails/storage/external/data
    restart: unless-stopped

  analytic-sandbox-ruby:
    build:
      context: ./ruby/agents/analytic-sandbox
      dockerfile: Dockerfile
    profiles:
      - ruby
    networks:
      - agent-isolated
    environment:
      MCP_SANDBOX_IMAGE: "${SANDBOX_PYTHON_IMAGE:-sandbox-python:local}"
      MCP_AUTH_TOKEN: "${RUBY_SANDBOX_TOKEN:-}"
      HOST_DATA_DIR: "${SANDBOX_DATA_PATH:-${PWD}/data/ruby-sandbox-data}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SANDBOX_DATA_PATH:-${PWD}/data/ruby-sandbox-data}:/app/data
    restart: unless-stopped

  # ============================================================
  # Python MCP Services + Agent (Tikhon)
  # Start with: make up PROFILES=python
  # ============================================================

  py-price-feed-mcp:
    <<: *python-base
    profiles:
      - python
    command: [ "uv", "run", "--no-dev", "python", "-m", "price_feed_mcp.server" ]
    environment:
      OTEL_SERVICE_NAME: py-price-feed-mcp
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      <<: *python-mcp-healthcheck

  py-news-mcp:
    <<: *python-base
    profiles:
      - python
    command: [ "uv", "run", "--no-dev", "python", "-m", "news_mcp.server" ]
    environment:
      OTEL_SERVICE_NAME: py-news-mcp
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      <<: *python-mcp-healthcheck

  py-onchain-data-mcp:
    <<: *python-base
    profiles:
      - python
    command: [ "uv", "run", "--no-dev", "python", "-m", "onchain_data_mcp.server" ]
    environment:
      OTEL_SERVICE_NAME: py-onchain-data-mcp
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')" ]
      <<: *python-mcp-healthcheck

  py-fear-greed-mcp:
    <<: *python-base
    profiles:
      - python
    command: [ "uv", "run", "--no-dev", "python", "-m", "fear_greed_mcp.server" ]
    environment:
      OTEL_SERVICE_NAME: py-fear-greed-mcp
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')" ]
      <<: *python-mcp-healthcheck

  py-agent:
    <<: *python-base
    profiles:
      - python
    command: [ "uv", "run", "--no-dev", "python", "-m", "agent.main" ]
    environment:
      OTEL_SERVICE_NAME: py-agent
    volumes:
      - ./python/config:/app/config:ro
      - ./python/logs:/app/logs
    depends_on:
      py-price-feed-mcp:
        condition: service_healthy
      py-news-mcp:
        condition: service_healthy
      py-onchain-data-mcp:
        condition: service_healthy
      py-fear-greed-mcp:
        condition: service_healthy
      trading-server:
        condition: service_healthy

networks:
  agent-isolated:
    internal: true

volumes:
  signoz_clickhouse_data:
  signoz_zookeeper_data:
  signoz_data:
  redis_data:
  classifiers_cache:
  ruby_solid_storage:
