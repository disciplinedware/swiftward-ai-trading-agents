<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1250" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .lane { fill:rgba(255,255,255,0.03); stroke:rgba(255,255,255,0.08); stroke-width:1; }
      .lane-title { font-weight:700; fill:#64748b; font-size:12px; letter-spacing:0.5px; }
      .trigger { fill:rgba(224,168,0,0.12); stroke:#e0a800; stroke-width:1.5; }
      .gate    { fill:rgba(191,57,137,0.12); stroke:#bf3989; stroke-width:1.5; }
      .cycle   { fill:rgba(14,165,233,0.12); stroke:#0ea5e9; stroke-width:1.5; }
      .stage   { fill:rgba(0,255,136,0.12); stroke:#00ff88; stroke-width:1.5; }
      .sink    { fill:rgba(124,58,237,0.12); stroke:#7c3aed; stroke-width:1.5; }
      .mcp     { fill:rgba(255,255,255,0.03); stroke:rgba(255,255,255,0.15); stroke-width:1; }
      .title   { font-weight:700; font-size:14px; fill:#e2e8f0; }
      .desc    { font-size:11px; fill:#64748b; }
      .edge    { stroke:#64748b; stroke-width:1.5; fill:none; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="1250" fill="#050b12"/>

  <text x="600" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">Python Deterministic LLM</text>

  <!-- ===== Triggers lane ===== -->
  <rect class="lane" x="40" y="80" width="900" height="170" rx="8"/>
  <text class="lane-title" x="55" y="100">TRIGGERS</text>

  <rect class="trigger" x="70" y="120" width="200" height="110" rx="6"/>
  <text class="title" x="170" y="155" text-anchor="middle">Clock Loop</text>
  <text class="desc" x="170" y="180" text-anchor="middle">Wakes up the agent on a</text>
  <text class="desc" x="170" y="196" text-anchor="middle">regular schedule.</text>

  <rect class="trigger" x="290" y="120" width="200" height="110" rx="6"/>
  <text class="title" x="390" y="155" text-anchor="middle">Tier 2 Loop</text>
  <text class="desc" x="390" y="180" text-anchor="middle">Wakes up the agent when the</text>
  <text class="desc" x="390" y="196" text-anchor="middle">market mood shifts.</text>

  <rect class="trigger" x="510" y="120" width="200" height="110" rx="6"/>
  <text class="title" x="610" y="155" text-anchor="middle">Price Spike Loop</text>
  <text class="desc" x="610" y="180" text-anchor="middle">Wakes up the agent on a</text>
  <text class="desc" x="610" y="196" text-anchor="middle">sudden price move.</text>

  <rect class="trigger" x="730" y="120" width="200" height="110" rx="6"/>
  <text class="title" x="830" y="155" text-anchor="middle">Exit Watchdog</text>
  <text class="desc" x="830" y="180" text-anchor="middle">Watches open positions and</text>
  <text class="desc" x="830" y="196" text-anchor="middle">closes them if needed.</text>

  <!-- ===== CooldownGate ===== -->
  <rect class="gate" x="280" y="290" width="420" height="70" rx="6"/>
  <text class="title" x="490" y="318" text-anchor="middle">Cooldown Gate</text>
  <text class="desc" x="490" y="340" text-anchor="middle">Holds the agent back from trading the same asset too often.</text>

  <!-- ===== Clock Cycle ===== -->
  <rect class="cycle" x="180" y="400" width="620" height="100" rx="6"/>
  <text class="title" x="490" y="430" text-anchor="middle">Trading Cycle</text>
  <text class="desc" x="490" y="455" text-anchor="middle">Collects fresh market signals, runs the brain,</text>
  <text class="desc" x="490" y="471" text-anchor="middle">and sends the resulting trades to execution.</text>

  <!-- ===== Brain lane ===== -->
  <rect class="lane" x="40" y="540" width="900" height="370" rx="8"/>
  <text class="lane-title" x="55" y="560">BRAIN</text>

  <rect class="stage" x="120" y="585" width="740" height="80" rx="6"/>
  <text class="title" x="490" y="613" text-anchor="middle">Stage 1 - Market Filter</text>
  <text class="desc" x="490" y="635" text-anchor="middle">Decides whether the overall market is safe enough to trade right now.</text>

  <rect class="stage" x="120" y="700" width="740" height="80" rx="6"/>
  <text class="title" x="490" y="728" text-anchor="middle">Stage 2 - Rotation Selector</text>
  <text class="desc" x="490" y="750" text-anchor="middle">Picks which assets look most promising to trade.</text>

  <rect class="stage" x="120" y="815" width="740" height="80" rx="6"/>
  <text class="title" x="490" y="843" text-anchor="middle">Stage 3 - Decision Engine</text>
  <text class="desc" x="490" y="865" text-anchor="middle">Decides how much to buy and where to set stop-loss and take-profit.</text>

  <!-- ===== TradingClient sink ===== -->
  <rect class="sink" x="320" y="950" width="340" height="70" rx="6"/>
  <text class="title" x="490" y="978" text-anchor="middle">Trade Execution</text>
  <text class="desc" x="490" y="1000" text-anchor="middle">Sends the final trade orders to the exchange.</text>

  <!-- ===== External MCPs ===== -->
  <rect class="lane" x="980" y="80" width="190" height="940" rx="8"/>
  <text class="lane-title" x="995" y="100">DATA SOURCES</text>

  <rect class="mcp" x="1000" y="130" width="150" height="50" rx="5"/>
  <text class="title" x="1075" y="152" text-anchor="middle">Price Feed</text>
  <text class="desc" x="1075" y="168" text-anchor="middle">Prices &amp; indicators</text>

  <rect class="mcp" x="1000" y="200" width="150" height="50" rx="5"/>
  <text class="title" x="1075" y="222" text-anchor="middle">Fear &amp; Greed</text>
  <text class="desc" x="1075" y="238" text-anchor="middle">Market mood index</text>

  <rect class="mcp" x="1000" y="270" width="150" height="50" rx="5"/>
  <text class="title" x="1075" y="292" text-anchor="middle">On-Chain</text>
  <text class="desc" x="1075" y="308" text-anchor="middle">On-chain activity</text>

  <rect class="mcp" x="1000" y="340" width="150" height="50" rx="5"/>
  <text class="title" x="1075" y="362" text-anchor="middle">News</text>
  <text class="desc" x="1075" y="378" text-anchor="middle">Headlines &amp; events</text>

  <rect class="mcp" x="1000" y="410" width="150" height="50" rx="5"/>
  <text class="title" x="1075" y="432" text-anchor="middle">Trading</text>
  <text class="desc" x="1075" y="448" text-anchor="middle">Portfolio, orders, ERC-8004</text>

  <!-- ===== Edges ===== -->
  <path class="edge" d="M170,230 C170,265 360,265 360,290" marker-end="url(#arrow)"/>
  <path class="edge" d="M390,230 C390,265 460,265 460,290" marker-end="url(#arrow)"/>
  <path class="edge" d="M610,230 C610,265 560,265 560,290" marker-end="url(#arrow)"/>

  <path class="edge" d="M490,360 L490,400" marker-end="url(#arrow)"/>

  <path class="edge" d="M490,500 L490,585" marker-end="url(#arrow)"/>

  <path class="edge" d="M490,665 L490,700" marker-end="url(#arrow)"/>
  <path class="edge" d="M490,780 L490,815" marker-end="url(#arrow)"/>
  <path class="edge" d="M490,895 L490,950" marker-end="url(#arrow)"/>

  <path class="edge" d="M930,180 L955,180 L955,985 L660,985" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(60,1080)">
    <text font-weight="700" font-size="13" fill="#e2e8f0">Legend</text>
    <rect class="trigger" x="0" y="15" width="18" height="14"/><text x="26" y="27" font-size="12" fill="#e2e8f0">trigger</text>
    <rect class="gate" x="90" y="15" width="18" height="14"/><text x="116" y="27" font-size="12" fill="#e2e8f0">gate</text>
    <rect class="cycle" x="170" y="15" width="18" height="14"/><text x="196" y="27" font-size="12" fill="#e2e8f0">cycle</text>
    <rect class="stage" x="250" y="15" width="18" height="14"/><text x="276" y="27" font-size="12" fill="#e2e8f0">brain stage</text>
    <rect class="sink" x="360" y="15" width="18" height="14"/><text x="386" y="27" font-size="12" fill="#e2e8f0">execution</text>
    <rect class="mcp" x="450" y="15" width="18" height="14"/><text x="476" y="27" font-size="12" fill="#e2e8f0">data source</text>
  </g>
</svg>
